<nav class="navbar app-navbar">
    <div class="container">
        <div class="navbar-brand">
            <a class="navbar-item app-navbar-brand" href="{{ url_for('index') }}">
                <span class="app-navbar-brand-mark">
                    <img src="{{ url_for('static', filename='logo-small.png') }}" alt="Logo">
                </span>
                <span class="app-navbar-brand-copy">
                    <strong>MTC Portal</strong>
                    <small>Medical Technology Council</small>
                </span>
            </a>
            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="siteNavbarMenu">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>
        <div id="siteNavbarMenu" class="navbar-menu">
            <div class="navbar-start app-navbar-links"></div>
            <div class="navbar-end app-navbar-user">
                {% if current_user.is_authenticated %}
                <div class="navbar-item">
                    <span class="app-navbar-user-chip">
                        <span class="icon">
                            {% if session.get('login_as') != 'member' %}
                            <i class="fas fa-user-cog"></i>
                            {% else %}
                            <i class="fas fa-user-circle"></i>
                            {% endif %}
                        </span>
                        <span>
                            <strong>{{ current_user }}</strong>
                            <small>Signed in</small>
                        </span>
                    </span>
                </div>
                <a class="navbar-item" href="{{ url_for('users.logout') }}">
                    <span class="icon">
                        <i class="fas fa-sign-out-alt"></i>
                    </span>
                    <span>ออกจากระบบ</span>
                </a>
                {% else %}
                <a class="navbar-item" href="{{ url_for('users.register_user') }}">
                    <span class="icon">
                        <i class="fas fa-user-cog"></i>
