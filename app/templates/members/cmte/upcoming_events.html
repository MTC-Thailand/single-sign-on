{% extends "base.html" %}

{% block head %}
{{ super() }}
<style>
    .calendar-toolbar {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: space-between;
        margin-bottom: 1.5rem;
    }

    .calendar-toolbar .buttons {
        margin-bottom: 0;
    }

    .calendar-month-title {
        margin-bottom: 0;
    }

    .calendar-grid {
        display: grid;
        gap: 1px;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        background-color: hsl(221, 14%, 86%);
        border: 1px solid hsl(221, 14%, 86%);
        border-radius: 0.75rem;
        overflow: hidden;
    }

    .calendar-weekday,
    .calendar-day {
        background: white;
    }

    .calendar-weekday {
        font-size: 0.9rem;
        font-weight: 700;
        padding: 0.9rem 0.75rem;
        text-align: center;
    }

    .calendar-day {
        min-height: 10rem;
        padding: 0.75rem;
    }

    .calendar-day.is-other-month {
        background: hsl(0, 0%, 98%);
        color: hsl(0, 0%, 48%);
    }

    .calendar-day.is-today {
        background: hsl(204, 86%, 97%);
    }

    .calendar-day-header {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
    }

    .calendar-day-number {
        font-weight: 700;
    }

    .calendar-events {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
    }

    .calendar-event {
        background: hsl(204, 71%, 95%);
        border-left: 3px solid hsl(204, 86%, 53%);
        border-radius: 0.5rem;
        color: hsl(229, 53%, 18%);
        display: block;
        font-size: 0.85rem;
        line-height: 1.3;
        padding: 0.4rem 0.5rem;
        text-decoration: none;
    }

    .calendar-event:hover {
        background: hsl(204, 86%, 91%);
        color: hsl(229, 53%, 18%);
    }

    .calendar-event-time {
        color: hsl(0, 0%, 29%);
        display: block;
        font-size: 0.75rem;
        margin-top: 0.15rem;
    }

    .calendar-empty {
        color: hsl(0, 0%, 48%);
        font-size: 0.8rem;
    }

    .calendar-empty-state {
        color: hsl(0, 0%, 48%);
        grid-column: 1 / -1;
        padding: 2.5rem 1rem;
        text-align: center;
    }

    @media screen and (max-width: 768px) {
        .calendar-grid {
            gap: 0.5rem;
            grid-template-columns: 1fr;
            background: transparent;
            border: 0;
            border-radius: 0;
        }

        .calendar-weekday {
            display: none;
        }

        .calendar-day {
            border: 1px solid hsl(221, 14%, 86%);
            border-radius: 0.75rem;
            min-height: auto;
        }

        .calendar-day-header::after {
            color: hsl(0, 0%, 48%);
            content: attr(data-weekday);
            font-size: 0.85rem;
            font-weight: 400;
        }
    }
</style>
{% endblock %}

{% block content %}
{% include "members/nav.html" %}
<section class="section">
    <div class="container">
        <div class="columns">
            <div class="column">
                <h1 class="title has-text-centered">รายการกิจกรรมใหม่</h1>
                <div class="box">
                    <div class="calendar-toolbar">
                        <div>
                            <h2 id="calendarMonthTitle" class="title is-4 calendar-month-title"></h2>
                            <p id="calendarSummary" class="subtitle is-6 mb-0"></p>
                        </div>
                        <div class="buttons">
                            <button id="calendarPrev" type="button" class="button is-light">เดือนก่อน</button>
                            <button id="calendarToday" type="button" class="button is-link is-light">เดือนปัจจุบัน</button>
                            <button id="calendarNext" type="button" class="button is-light">เดือนถัดไป</button>
                        </div>
                    </div>
                    <div id="upcomingEventsCalendar" class="calendar-grid"></div>
                </div>
                <p>
                    <span class="icon is-medium">
                       <i class="fa-solid fa-hand-pointer fa-2x has-text-link"></i>
                    </span>
                    <span class="has-text-link">คลิกที่ชื่อกิจกรรมเพื่อดูรายละเอียด</span>
                </p>
                <div id="info-modal"></div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block scripts %}
{{super()}}
<script>
    $(document).ready(() => {
        moment.locale('th')

        const calendarEl = document.getElementById('upcomingEventsCalendar')
        const monthTitleEl = document.getElementById('calendarMonthTitle')
        const summaryEl = document.getElementById('calendarSummary')
        const prevButton = document.getElementById('calendarPrev')
        const todayButton = document.getElementById('calendarToday')
        const nextButton = document.getElementById('calendarNext')
        const rawEvents = {{ events|tojson|safe }}
        const weekdayLabels = ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.']
        const today = moment().startOf('day')
        let currentMonth = today.clone().startOf('month')
        const events = rawEvents
            .map((event) => ({
                ...event,
                startMoment: event.start_date ? moment(event.start_date) : null,
                endMoment: event.end_date ? moment(event.end_date) : null,
            }))
            .filter((event) => event.startMoment && event.endMoment)
            .sort((a, b) => a.startMoment.valueOf() - b.startMoment.valueOf())

        if (events.length) {
            currentMonth = events[0].startMoment.clone().startOf('month')
        }

        function escapeHtml(value) {
            return $('<div>').text(value || '').html()
        }

        function formatTimeRange(event) {
            if (!event.startMoment || !event.endMoment) {
                return ''
            }

            const sameDay = event.startMoment.isSame(event.endMoment, 'day')
            if (sameDay) {
                return `${event.startMoment.format('HH:mm')} - ${event.endMoment.format('HH:mm')}`
            }

            return `${event.startMoment.format('DD/MM HH:mm')} - ${event.endMoment.format('DD/MM HH:mm')}`
        }

        function eventOccursOnDate(event, day) {
            return day.isSameOrAfter(event.startMoment.clone().startOf('day'))
                && day.isSameOrBefore(event.endMoment.clone().startOf('day'))
        }

        function buildEventMarkup(event) {
            const meta = [
                formatTimeRange(event),
                event.venue,
                event.points ? `${event.points} คะแนน` : null,
            ].filter(Boolean).join(' | ')

            return `
                <a
                    class="calendar-event"
                    hx-swap="innerHTML"
                    hx-target="#info-modal"
                    hx-get="/cmte/events/${event.id}/info"
                    title="${escapeHtml(event.title)}"
                >
                    <span>${escapeHtml(event.title)}</span>
                    ${meta ? `<span class="calendar-event-time">${escapeHtml(meta)}</span>` : ''}
                </a>
            `
        }

        function renderCalendar() {
            monthTitleEl.textContent = currentMonth.format('MMMM YYYY')

            if (!events.length) {
                summaryEl.textContent = 'ยังไม่พบกิจกรรมใหม่ในเดือนนี้'
                calendarEl.innerHTML = '<div class="calendar-empty-state">ยังไม่พบกิจกรรมใหม่ในระบบ</div>'
                return
            }

            const monthEvents = events.filter((event) => (
                event.endMoment.isSameOrAfter(currentMonth, 'month')
                && event.startMoment.isSameOrBefore(currentMonth.clone().endOf('month'), 'month')
            ))
            summaryEl.textContent = `พบ ${monthEvents.length} กิจกรรมในเดือนนี้`

            const gridStart = currentMonth.clone().startOf('week')
            const gridEnd = currentMonth.clone().endOf('month').endOf('week')
            const cells = []

            weekdayLabels.forEach((label) => {
                cells.push(`<div class="calendar-weekday">${label}</div>`)
            })

            for (let day = gridStart.clone(); day.isSameOrBefore(gridEnd, 'day'); day.add(1, 'day')) {
                const dayEvents = events.filter((event) => eventOccursOnDate(event, day))
                const isCurrentMonth = day.isSame(currentMonth, 'month')
                const classes = ['calendar-day']

                if (!isCurrentMonth) {
                    classes.push('is-other-month')
                }

                if (day.isSame(today, 'day')) {
                    classes.push('is-today')
                }

                cells.push(`
                    <div class="${classes.join(' ')}">
                        <div class="calendar-day-header" data-weekday="${weekdayLabels[day.day()]}">
                            <span class="calendar-day-number">${day.date()}</span>
                            ${dayEvents.length ? `<span class="tag is-link is-light is-rounded">${dayEvents.length}</span>` : ''}
                        </div>
                        <div class="calendar-events">
                            ${dayEvents.length ? dayEvents.map(buildEventMarkup).join('') : '<span class="calendar-empty">ไม่มีกิจกรรม</span>'}
                        </div>
                    </div>
                `)
            }

            calendarEl.innerHTML = cells.join('')
            htmx.process(calendarEl)
        }

        renderCalendar()

        prevButton.addEventListener('click', () => {
            currentMonth = currentMonth.clone().subtract(1, 'month')
            renderCalendar()
        })

        todayButton.addEventListener('click', () => {
            currentMonth = today.clone().startOf('month')
            renderCalendar()
        })

        nextButton.addEventListener('click', () => {
            currentMonth = currentMonth.clone().add(1, 'month')
            renderCalendar()
        })
    })
</script>
{% endblock %}
